<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 PONG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            background: #0a0a0a;
            border: 5px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5), 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        canvas {
            display: block;
            background: #0a0a0a;
        }

        .scores {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
            font-size: 56px;
            font-weight: bold;
        }

        .score-p1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .score-p2 {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .menu h1 {
            font-size: 96px;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite;
            font-weight: bold;
        }

        .menu .controls {
            display: flex;
            gap: 80px;
            margin-bottom: 60px;
            font-size: 26px;
        }

        .menu .player-controls {
            text-align: center;
        }

        .menu .p1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }

        .menu .p2 {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .score-limit-input {
            margin: 30px 0;
            font-size: 24px;
        }

        .score-limit-input label {
            color: #ffffff;
            margin-right: 15px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .score-limit-input input {
            width: 80px;
            padding: 10px;
            font-size: 24px;
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            border-radius: 5px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .score-limit-input input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            background: rgba(0, 255, 255, 0.3);
        }

        .menu .start {
            font-size: 32px;
            color: #00ff00;
            animation: blink 1s ease-in-out infinite;
            margin-top: 40px;
            text-shadow: 0 0 10px #00ff00;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.8)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.8)); }
        }

        @keyframes blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.3; }
        }

        .pause-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .pause-screen h1 {
            font-size: 72px;
            color: #ffffff;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .pause-screen p {
            font-size: 28px;
            color: #00ff00;
            animation: blink 1s ease-in-out infinite;
            text-shadow: 0 0 10px #00ff00;
        }

        .winner-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .winner-screen h1 {
            font-size: 96px;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            animation: glow 2s ease-in-out infinite;
            font-weight: bold;
        }

        .winner-screen .winner-text {
            font-size: 48px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .winner-screen .winner-text.p1 {
            color: #00ffff;
        }

        .winner-screen .winner-text.p2 {
            color: #ff00ff;
        }

        .winner-screen .final-score {
            font-size: 36px;
            color: #ffff00;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
        }

        .winner-screen p {
            font-size: 28px;
            color: #00ff00;
            animation: blink 1s ease-in-out infinite;
            text-shadow: 0 0 10px #00ff00;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 18px;
            z-index: 10;
        }

        .back-button {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(10, 10, 10, 0.6);
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 15;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .back-button:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        .back-button:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        .target-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffff00;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
            z-index: 10;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">← HOME</a>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div class="scores">
            <div class="score-p1" id="score1">0</div>
            <div class="score-p2" id="score2">0</div>
        </div>
        <div class="target-display" id="targetDisplay">First to: 5</div>
        <div id="menu" class="menu">
            <h1>⚡ PONG ⚡</h1>
            <div class="controls">
                <div class="player-controls p1">
                    <div>PLAYER 1</div>
                    <div style="font-size: 32px; margin-top: 10px;">W / S</div>
                </div>
                <div class="player-controls p2">
                    <div>PLAYER 2</div>
                    <div style="font-size: 32px; margin-top: 10px;">↑ / ↓</div>
                </div>
            </div>
            <div class="score-limit-input">
                <label for="winningScore">First to:</label>
                <input type="number" id="winningScore" value="5" min="1" max="100">
            </div>
            <p class="start">Press SPACE to START</p>
        </div>
        <div id="pause" class="pause-screen hidden">
            <h1>⏸ PAUSED</h1>
            <p>Press P to resume</p>
        </div>
        <div id="winner" class="winner-screen hidden">
            <h1 id="winnerTitle">WINNER!</h1>
            <div id="winnerInfo" class="winner-text"></div>
            <div class="final-score" id="finalScoreDisplay">0 - 0</div>
            <p>Press SPACE to play again</p>
        </div>
        <div class="hint">Press P to pause</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game states
        const GAME_STATE = {
            MENU: 'menu',
            PLAYING: 'playing',
            PAUSE: 'pause'
        };

        // Colors
        const COLORS = {
            CYAN: '#00ffff',
            MAGENTA: '#ff00ff',
            WHITE: '#ffffff',
            BLACK: '#0a0a0a',
            LIGHT_GRAY: '#333333'
        };

        class Paddle {
            constructor(x, y, isPlayer1 = true) {
                this.x = x;
                this.y = y;
                this.width = 15;
                this.height = 100;
                this.speed = 7;
                this.velocity = 0;
                this.isPlayer1 = isPlayer1;
                this.color = isPlayer1 ? COLORS.CYAN : COLORS.MAGENTA;
            }

            update() {
                this.y += this.velocity;
                this.y = Math.max(0, Math.min(canvas.height - this.height, this.y));
            }

            draw() {
                // Glow effect
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;

                // Outline
                ctx.strokeStyle = COLORS.WHITE;
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
            }

            handleInput(keys) {
                if (this.isPlayer1) {
                    if (keys['w']) this.velocity = -this.speed;
                    else if (keys['s']) this.velocity = this.speed;
                    else this.velocity = 0;
                } else {
                    if (keys['ArrowUp']) this.velocity = -this.speed;
                    else if (keys['ArrowDown']) this.velocity = this.speed;
                    else this.velocity = 0;
                }
            }
        }

        class Ball {
            constructor() {
                this.radius = 8;
                this.reset();
            }

            reset() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                const angle = Math.random() * Math.PI / 3 - Math.PI / 6;
                this.speed = 6;
                this.vx = this.speed * Math.cos(angle) * (Math.random() > 0.5 ? 1 : -1);
                this.vy = this.speed * Math.sin(angle);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off top and bottom
                if (this.y - this.radius <= 0 || this.y + this.radius >= canvas.height) {
                    this.vy = -this.vy;
                    this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                }
            }

            draw() {
                ctx.shadowColor = COLORS.WHITE;
                ctx.shadowBlur = 10;
                ctx.fillStyle = COLORS.WHITE;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.strokeStyle = COLORS.LIGHT_GRAY;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            checkPaddleCollision(paddle) {
                // Check if ball is overlapping with paddle
                if (this.x - this.radius < paddle.x + paddle.width &&
                    this.x + this.radius > paddle.x &&
                    this.y - this.radius < paddle.y + paddle.height &&
                    this.y + this.radius > paddle.y) {
                    
                    // Only bounce if ball is moving towards the paddle
                    const isPlayer1Paddle = paddle.x < canvas.width / 2;
                    // Player 1 (left): bounce when moving left (vx < 0)
                    // Player 2 (right): bounce when moving right (vx > 0)
                    const movingTowardsPaddle = (isPlayer1Paddle && this.vx < 0) || 
                                               (!isPlayer1Paddle && this.vx > 0);
                    
                    if (!movingTowardsPaddle) return;

                    // Reverse velocity
                    this.vx = -this.vx;
                    if (Math.abs(this.vx) < 5) {
                        this.vx = this.vx > 0 ? 5 : -5;
                    }

                    // Add spin based on paddle movement
                    const hitPos = (this.y - paddle.y) / paddle.height;
                    this.vy = 10 * (hitPos - 0.5);

                    // Clamp total speed
                    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (speed > 12) {
                        this.vx = (this.vx / speed) * 12;
                        this.vy = (this.vy / speed) * 12;
                    }

                    // Push ball far enough away from paddle to avoid re-collision
                    const minDistance = this.radius + paddle.width + 3;
                    if (isPlayer1Paddle) {
                        this.x = Math.max(paddle.x + minDistance, this.x);
                    } else {
                        this.x = Math.min(paddle.x - minDistance, this.x);
                    }

                    createParticles(this.x, this.y, paddle.color, 8);
                }
            }

            isOffScreen() {
                return this.x < -this.radius || this.x > canvas.width + this.radius;
            }
        }

        let particles = [];

        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = 20;
                this.radius = 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // Gravity
                this.life--;
            }

            draw() {
                ctx.globalAlpha = this.life / 20;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                const vx = speed * Math.cos(angle);
                const vy = speed * Math.sin(angle);
                particles.push(new Particle(x, y, vx, vy, color));
            }
        }

        class Game {
            constructor() {
                this.state = GAME_STATE.MENU;
                this.paddle1 = new Paddle(20, canvas.height / 2 - 50, true);
                this.paddle2 = new Paddle(canvas.width - 35, canvas.height / 2 - 50, false);
                this.ball = new Ball();
                this.score1 = 0;
                this.score2 = 0;
                this.keys = {};
                this.winningScore = 5;
            }

            reset() {
                this.paddle1 = new Paddle(20, canvas.height / 2 - 50, true);
                this.paddle2 = new Paddle(canvas.width - 35, canvas.height / 2 - 50, false);
                this.ball = new Ball();
                this.score1 = 0;
                this.score2 = 0;
                this.state = GAME_STATE.PLAYING;
                particles = [];
                this.winningScore = parseInt(document.getElementById('winningScore').value) || 5;
                document.getElementById('targetDisplay').textContent = `First to: ${this.winningScore}`;
            }

            update() {
                if (this.state !== GAME_STATE.PLAYING) return;

                this.paddle1.handleInput(this.keys);
                this.paddle2.handleInput(this.keys);
                this.paddle1.update();
                this.paddle2.update();
                this.ball.update();

                particles.forEach(p => p.update());
                particles = particles.filter(p => p.life > 0);

                this.ball.checkPaddleCollision(this.paddle1);
                this.ball.checkPaddleCollision(this.paddle2);

                if (this.ball.isOffScreen()) {
                    if (this.ball.x < 0) {
                        this.score2++;
                        createParticles(canvas.width / 2, canvas.height / 2, COLORS.MAGENTA, 15);
                    } else {
                        this.score1++;
                        createParticles(canvas.width / 2, canvas.height / 2, COLORS.CYAN, 15);
                    }
                    document.getElementById('score1').textContent = this.score1;
                    document.getElementById('score2').textContent = this.score2;
                    
                    // Check for winner
                    if (this.score1 >= this.winningScore) {
                        this.state = 'winner';
                        this.winner = 1;
                    } else if (this.score2 >= this.winningScore) {
                        this.state = 'winner';
                        this.winner = 2;
                    } else {
                        this.ball.reset();
                    }
                }
            }

            drawMenu() {
                document.getElementById('menu').classList.remove('hidden');
                document.getElementById('targetDisplay').classList.add('hidden');
            }

            drawGame() {
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('winner').classList.add('hidden');
                document.getElementById('targetDisplay').classList.remove('hidden');

                // Background
                ctx.fillStyle = COLORS.BLACK;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Center line
                ctx.strokeStyle = COLORS.LIGHT_GRAY;
                ctx.setLineDash([15, 15]);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(canvas.width / 2, canvas.height);
                ctx.stroke();
                ctx.setLineDash([]);

                // Paddles
                this.paddle1.draw();
                this.paddle2.draw();

                // Ball
                this.ball.draw();

                // Particles
                particles.forEach(p => p.draw());
            }

            drawWinner() {
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('winner').classList.remove('hidden');
                
                const winnerEl = document.getElementById('winnerInfo');
                if (this.winner === 1) {
                    winnerEl.textContent = '🎉 PLAYER 1 WINS! 🎉';
                    winnerEl.className = 'winner-text p1';
                } else {
                    winnerEl.textContent = '🎉 PLAYER 2 WINS! 🎉';
                    winnerEl.className = 'winner-text p2';
                }
                document.getElementById('finalScoreDisplay').textContent = `${this.score1} - ${this.score2}`;
            }

            draw() {
                if (this.state === GAME_STATE.MENU) {
                    ctx.fillStyle = COLORS.BLACK;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    this.drawMenu();
                } else if (this.state === 'winner') {
                    this.drawGame();
                    this.drawWinner();
                } else {
                    this.drawGame();
                }
            }
        }

        const game = new Game();

        function gameLoop() {
            game.update();
            game.draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            game.keys[key] = true;
            game.keys[e.code] = true;

            if (e.code === 'Space') {
                e.preventDefault();
                if (game.state === GAME_STATE.MENU) {
                    game.reset();
                } else if (game.state === GAME_STATE.PAUSE) {
                    game.state = GAME_STATE.PLAYING;
                    document.getElementById('pause').classList.add('hidden');
                } else if (game.state === 'winner') {
                    game.reset();
                }
            }

            if (key === 'p') {
                if (game.state === GAME_STATE.PLAYING) {
                    game.state = GAME_STATE.PAUSE;
                    document.getElementById('pause').classList.remove('hidden');
                } else if (game.state === GAME_STATE.PAUSE) {
                    game.state = GAME_STATE.PLAYING;
                    document.getElementById('pause').classList.add('hidden');
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            game.keys[key] = false;
            game.keys[e.code] = false;
        });

        gameLoop();
    </script>
</body>
</html>
